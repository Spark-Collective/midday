            NEXT_PUBLIC_SUPABASE_URL=https://uzdlmwhvlzmjzkjcjgut.supabase.co
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJpc3MiOiAic3VwYWJhc2UiLCAicmVmIjogInV6ZGxtd2h2bHptanpramNqZ3V0IiwgInJvbGUiOiAiYW5vbiIsICJpYXQiOiAxNzgzNTgxNTY3LCAiZXhwIjogMjA5ODk0MTU2N30.BcAQ4DjrkrFSrk_BqJr_eq4LHcppNV30MUJ6d4lXwUM
