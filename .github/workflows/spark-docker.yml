# Spark fork: build api + worker images and publish to GHCR, so small deploy boxes
# only pull (building the monorepo needs ~10GB of cache; it filled the sparkos box).
# Per-arch tags (no manifest merge): <app>:main-amd64 / <app>:main-arm64.
name: spark-docker

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "packages/**"
      - "bunfig.toml"
      - "package.json"
      - ".github/workflows/spark-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - app: api
            arch: arm64
            runner: ubuntu-24.04-arm
          - app: worker
            arch: arm64
            runner: ubuntu-24.04-arm
          - app: api
            arch: amd64
            runner: ubuntu-latest
          - app: worker
            arch: amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp git sha (Dockerfiles expect it)
        run: git rev-parse --short HEAD > .git-commit-sha
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ghcr.io/spark-collective/midday-${{ matrix.app }}:main-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.arch }}
