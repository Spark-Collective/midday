# Spark fork: build api + worker images and publish to GHCR, so small deploy boxes
# only pull (building the monorepo needs ~10GB of cache; it filled the sparkos box).
# Per-arch tags (no manifest merge): <app>:main-amd64 / <app>:main-arm64.
name: spark-docker

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "apps/dashboard/**"
      - "packages/**"
      - "bunfig.toml"
      - "package.json"
      - ".github/workflows/spark-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - app: api
            arch: arm64
            runner: ubuntu-24.04-arm
          - app: worker
            arch: arm64
            runner: ubuntu-24.04-arm
          - app: api
            arch: amd64
            runner: ubuntu-latest
          - app: worker
            arch: amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp git sha (Dockerfiles expect it)
        run: git rev-parse --short HEAD > .git-commit-sha
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ghcr.io/spark-collective/midday-${{ matrix.app }}:main-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.arch }}

  dashboard:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Stamp git sha
        run: git rev-parse --short HEAD > .git-commit-sha
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ghcr.io/spark-collective/midday-dashboard:main-arm64
          cache-from: type=gha,scope=dashboard-arm64
          cache-to: type=gha,mode=max,scope=dashboard-arm64
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://uzdlmwhvlzmjzkjcjgut.supabase.co
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_slrH7uz8CIiS7k8DTGG2Pw_H-1vGkow
            NEXT_PUBLIC_SUPABASE_ID=uzdlmwhvlzmjzkjcjgut
            NEXT_PUBLIC_URL=https://ops.sparkcollective.be
            NEXT_PUBLIC_API_URL=https://ops-api.sparkcollective.be
            NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=Jarvis_clawdisbot

  publish-tars:
    # GHCR org packages are private and visibility is UI-only; ship the arm64
    # images as release assets on this public repo so deploy boxes pull with
    # plain HTTPS (docker load), no registry auth.
    needs: [build, dashboard]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and save images
        run: |
          for app in api worker dashboard; do
            docker pull -q ghcr.io/spark-collective/midday-$app:main-arm64
            docker save ghcr.io/spark-collective/midday-$app:main-arm64 | zstd -T0 -5 -o midday-$app-arm64.tar.zst
          done
          ls -lh midday-*.tar.zst
      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete images-main --yes 2>/dev/null || true
          git push --delete origin refs/tags/images-main 2>/dev/null || true
          gh release create images-main --title "Rolling deploy images (main, arm64)" \
            --notes "docker image tars for deploy boxes: curl, zstd -d, docker load" \
            midday-api-arm64.tar.zst midday-worker-arm64.tar.zst midday-dashboard-arm64.tar.zst
